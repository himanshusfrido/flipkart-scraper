name: Flipkart FSN Scraper — Frido

on:
  schedule:
    - cron: '15 0,6,12,18 * * *'   # Every 6 hours at :15 past hour (UTC)
  workflow_dispatch:                 # Manual trigger for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m src.main

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ github.run_number }}
          path: output/*.csv
          retention-days: 30

      - name: Commit results to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/*.csv logs/*.log
          git diff-index --quiet HEAD || git commit -m "Scrape: $(date +'%Y-%m-%d %H:%M') UTC"
          git push
